{% load i18n %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PowerTradeAI — Chart</title>
<style>
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e2e4e9;
  --text: #1a1d23;
  --text-2: #5f6370;
  --text-3: #9194a0;
  --accent: #3b5bdb;
  --green: #0ca678;
  --red: #e03131;
  --radius: 8px;
  --chart-bg: #ffffff;
  --chart-text: #333;
  --chart-grid: #e2e4e9;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111318;
    --surface: #1a1d24;
    --border: #2c2f38;
    --text: #e4e5e9;
    --text-2: #9194a0;
    --text-3: #5f6370;
    --accent: #5c7cfa;
    --green: #20c997;
    --red: #ff6b6b;
    --chart-bg: #1a1d24;
    --chart-text: #d1d4dc;
    --chart-grid: #2c2f38;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.shell {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 20px;
}

header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
}

header a {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.controls label {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
}

.controls input, .controls select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
}

.controls input[type="text"] {
  width: 80px;
  text-transform: uppercase;
}

.controls button {
  padding: 6px 14px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

.controls button:hover { opacity: 0.9; }

#chart-container {
  width: 100%;
  height: calc(100vh - 140px);
  min-height: 400px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}

.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-2);
}

.legend span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend .dot {
  width: 10px;
  height: 3px;
  border-radius: 1px;
  display: inline-block;
}

.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  color: var(--text-2);
  font-size: 14px;
  z-index: 10;
}

.htf-legend {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.htf-legend strong {
  color: var(--text-2);
  font-weight: 600;
}

/* ---- Chat con el agente ---- */
#chat-fab {
  position: fixed; right: 20px; bottom: 20px; z-index: 40;
  width: 52px; height: 52px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 22px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
#chat-drawer {
  position: fixed; top: 0; right: 0; z-index: 50;
  width: 370px; max-width: 92vw; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border);
  display: none; flex-direction: column;
  box-shadow: -6px 0 24px rgba(0,0,0,0.25);
}
#chat-drawer.open { display: flex; }
.chat-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px;
}
.chat-head strong { color: var(--accent); }
.chat-close {
  background: none; border: none; color: var(--text-3); font-size: 16px;
  cursor: pointer;
}
.chat-msgs {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-hint { color: var(--text-3); font-size: 12px; line-height: 1.5; }
.bubble {
  max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px;
  line-height: 1.45; white-space: pre-wrap; word-break: break-word;
}
.bubble.user { align-self: flex-end; background: var(--accent); color: #fff;
  border-bottom-right-radius: 4px; }
.bubble.bot { align-self: flex-start; background: var(--bg);
  border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble.bot.thinking { color: var(--text-3); font-style: italic; }
.bubble .meta { display: block; margin-top: 4px; font-size: 11px;
  color: var(--text-3); }
.chat-input {
  display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border);
}
.chat-input textarea {
  flex: 1; resize: none; max-height: 120px; padding: 9px 11px;
  border: 1px solid var(--border); border-radius: 10px; background: var(--bg);
  color: var(--text); font-size: 13px; font-family: inherit;
}
.chat-input button {
  border: none; border-radius: 10px; background: var(--accent); color: #fff;
  width: 42px; font-size: 16px; cursor: pointer;
}
.chat-input button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>Chart</h1>
    <a href="{% url 'powertradeai:dashboard' %}">← Dashboard</a>
  </header>

  <div class="controls">
    <label>Ticker</label>
    <input type="text" id="symbol" value="SPY" maxlength="5">
    <label>Dias</label>
    <select id="days">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="20">20</option>
      <option value="40">40</option>
    </select>
    <button id="load-btn">Cargar</button>
    <button id="auto-btn" style="background:var(--green)">Live</button>
    <span id="auto-status" style="font-size:12px;font-weight:600;color:var(--green)">LIVE</span>
    <span id="last-update" style="font-size:11px;color:var(--text-3)"></span>
  </div>

  <div id="chart-container">
    <div class="loading" id="loading">Cargando datos...</div>
  </div>

  <div class="legend" id="ma-legend"></div>
  <div class="htf-legend" id="htf-legend"></div>
</div>

<!-- Chat con el agente, sobre el ticker del grafico -->
<button id="chat-fab" onclick="toggleChat()" title="Chat con el agente">💬</button>
<div id="chat-drawer">
  <div class="chat-head">
    <span>Agente · <strong id="chat-symbol">SPY</strong></span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="chat-hint">Pregúntale al agente sobre <span id="chat-hint-sym">SPY</span>: “¿sesgo ahora?”, “¿cómo está vs VWAP?”, “vigílame 400”.</div>
  </div>
  <div class="chat-input">
    <textarea id="chat-text" rows="1" placeholder="Escribe..." onkeydown="chatKey(event)"></textarea>
    <button id="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const MA_COLORS = {
  '9':   '#e67700',
  '20':  '#1c7ed6',
  '50':  '#ae3ec9',
  '100': '#2b8a3e',
  '200': '#e03131',
};

const HTF_STYLES = {
  '1h':  { dash: false, width: 1 },
  '1d':  { dash: true,  width: 2 },
  '1w':  { dash: true,  width: 2 },
};

const HTF_LABELS = { '1h': '1H', '1d': 'D', '1w': 'W' };

const BB_COLOR = '#4c8dff';       // linea de las bandas (azul)
const BB_FILL = 'rgba(76, 141, 255, 0.12)';  // relleno translucido azulito
const VWAP_COLOR = '#00e5ff';     // VWAP en cian brillante: no lo usa ninguna MA

let chart = null;
let candleSeries = null;
let maSeriesMap = {};
let bbSeries = {};
let bbFill = null;
let vwapSeries = null;
let priceLines = [];
let currentSymbol = null;
let lastCandle = null;
let liveCloses = [];   // cierres del 15m visibles, para recalcular en local
let bbFillPts = [];    // puntos del relleno de Bollinger (upper/lower)

function isDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

// Primitive de canvas: pinta el area entre la banda superior y la inferior.
// Lightweight Charts v4 no trae "band series", asi que lo dibujamos a mano.
function createBollingerFill() {
  let points = [];   // [{time, upper, lower}]
  let series = null, chartRef = null, requestUpdate = null;

  const renderer = {
    draw(target) {
      if (points.length < 2 || !series) return;
      const ts = chartRef.timeScale();
      target.useMediaCoordinateSpace((scope) => {
        const ctx = scope.context;
        ctx.beginPath();
        let started = false;
        for (const p of points) {
          const x = ts.timeToCoordinate(p.time);
          const y = series.priceToCoordinate(p.upper);
          if (x == null || y == null) continue;
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        if (!started) return;
        for (let i = points.length - 1; i >= 0; i--) {
          const p = points[i];
          const x = ts.timeToCoordinate(p.time);
          const y = series.priceToCoordinate(p.lower);
          if (x == null || y == null) continue;
          ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = BB_FILL;
        ctx.fill();
      });
    },
  };

  const paneView = {
    renderer: () => renderer,
    zOrder: () => 'bottom',   // detras de las velas
  };

  return {
    attached(params) {
      chartRef = params.chart;
      series = params.series;
      requestUpdate = params.requestUpdate;
    },
    detached() {},
    paneViews: () => [paneView],
    updateAllViews() {},
    setData(pts) {
      points = pts;
      if (requestUpdate) requestUpdate();
    },
  };
}

function chartColors() {
  const dark = isDark();
  return {
    bg: dark ? '#1a1d24' : '#ffffff',
    text: dark ? '#d1d4dc' : '#333333',
    grid: dark ? '#2c2f38' : '#e2e4e9',
  };
}

function createChart() {
  const container = document.getElementById('chart-container');
  if (chart) { chart.remove(); chart = null; }
  maSeriesMap = {};
  bbSeries = {};
  priceLines = [];

  const c = chartColors();
  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: { background: { type: 'solid', color: c.bg }, textColor: c.text },
    grid: {
      vertLines: { color: c.grid },
      horzLines: { color: c.grid },
    },
    timeScale: { timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });

  // Bollinger fill (band area) drawn first so it sits behind candles.
  bbSeries.upper = chart.addLineSeries({
    color: BB_COLOR, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  bbSeries.lower = chart.addLineSeries({
    color: BB_COLOR, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });
  bbSeries.middle = chart.addLineSeries({
    color: BB_COLOR, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#0ca678', downColor: '#e03131',
    borderUpColor: '#0ca678', borderDownColor: '#e03131',
    wickUpColor: '#0ca678', wickDownColor: '#e03131',
  });

  // Relleno azulito entre las bandas (usa la escala de precio de las velas).
  bbFill = createBollingerFill();
  candleSeries.attachPrimitive(bbFill);

  for (const period of Object.keys(MA_COLORS)) {
    maSeriesMap[period] = chart.addLineSeries({
      color: MA_COLORS[period], lineWidth: 1,
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    });
  }

  // VWAP de sesion: linea cian solida y gruesa para leerla de un vistazo.
  vwapSeries = chart.addLineSeries({
    color: VWAP_COLOR, lineWidth: 3,
    lineStyle: LightweightCharts.LineStyle.Solid,
    priceLineVisible: false, lastValueVisible: true, crosshairMarkerVisible: false,
  });

  new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  }).observe(container);
}

function buildLegend() {
  const el = document.getElementById('ma-legend');
  el.innerHTML = '<span style="font-weight:600">15m MAs:</span> ' +
    Object.entries(MA_COLORS).map(([p, color]) =>
      `<span><span class="dot" style="background:${color}"></span>MA ${p}</span>`
    ).join('') +
    `<span><span class="dot" style="background:${BB_COLOR}"></span>Bollinger 20,2</span>` +
    `<span><span class="dot" style="background:${VWAP_COLOR}"></span>VWAP</span>`;
}

async function loadData() {
  const symbol = document.getElementById('symbol').value.trim().toUpperCase() || 'SPY';
  const days = document.getElementById('days').value;
  const loading = document.getElementById('loading');
  const firstLoad = !chart;
  if (firstLoad) loading.style.display = 'flex';

  try {
    const resp = await fetch(`{% url 'powertradeai:chart_data' %}?symbol=${symbol}&days=${days}`);
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    // Recreate the chart only on first load or when the symbol changes;
    // otherwise just push new data so the user's zoom/pan is preserved.
    const rebuild = firstLoad || symbol !== currentSymbol;
    if (rebuild) createChart();

    // Preserve the visible range across a live refresh.
    const savedRange = rebuild ? null : chart.timeScale().getVisibleLogicalRange();

    candleSeries.setData(data.candles);
    lastCandle = data.candles.length ? {...data.candles[data.candles.length - 1]} : null;
    liveCloses = data.candles.map(c => c.close);

    for (const period of Object.keys(MA_COLORS)) {
      maSeriesMap[period].setData(data.ma_curves[period] || []);
    }

    if (vwapSeries) vwapSeries.setData(data.vwap || []);

    const bb = data.bollinger || {};
    bbSeries.upper.setData(bb.upper || []);
    bbSeries.middle.setData(bb.middle || []);
    bbSeries.lower.setData(bb.lower || []);

    // Alimentar el relleno: combinar upper/lower por timestamp.
    const lowerByTime = {};
    for (const p of (bb.lower || [])) lowerByTime[p.time] = p.value;
    bbFillPts = (bb.upper || [])
      .filter(p => lowerByTime[p.time] != null)
      .map(p => ({ time: p.time, upper: p.value, lower: lowerByTime[p.time] }));
    if (bbFill) bbFill.setData(bbFillPts);

    // Higher-timeframe MAs as horizontal price lines: clear and redraw.
    for (const pl of priceLines) candleSeries.removePriceLine(pl);
    priceLines = [];
    for (const [tf, lines] of Object.entries(data.htf_lines)) {
      for (const [period, price] of Object.entries(lines)) {
        priceLines.push(candleSeries.createPriceLine({
          price: price,
          color: MA_COLORS[period] || '#888',
          lineWidth: HTF_STYLES[tf]?.width || 1,
          lineStyle: HTF_STYLES[tf]?.dash
            ? LightweightCharts.LineStyle.Dashed
            : LightweightCharts.LineStyle.Solid,
          axisLabelVisible: true,
          title: `${HTF_LABELS[tf]} MA${period}`,
        }));
      }
    }

    if (rebuild) {
      chart.timeScale().fitContent();
    } else if (savedRange) {
      chart.timeScale().setVisibleLogicalRange(savedRange);
    }
    currentSymbol = symbol;

    const htfEl = document.getElementById('htf-legend');
    let htfHtml = '';
    for (const [tf, lines] of Object.entries(data.htf_lines)) {
      if (!Object.keys(lines).length) continue;
      const style = HTF_STYLES[tf]?.dash ? 'dashed' : 'solid';
      const entries = Object.entries(lines).map(([p, v]) =>
        `<span style="color:${MA_COLORS[p]}">MA${p}: ${v}</span>`
      ).join(' · ');
      htfHtml += `<span><strong>${HTF_LABELS[tf]}</strong> (${style}): ${entries}</span>`;
    }
    htfEl.innerHTML = htfHtml;
    document.getElementById('last-update').textContent =
      'Actualizado ' + new Date().toLocaleTimeString();
  } catch (err) {
    if (firstLoad) {
      loading.textContent = 'Error: ' + err.message;
      loading.style.display = 'flex';
    } else {
      document.getElementById('last-update').textContent = 'Error al actualizar';
    }
    return;
  } finally {
    if (firstLoad) loading.style.display = 'none';
  }
}

// Prefill del ticker desde la URL (?symbol=XXX), para llegar desde el scanner.
const urlSymbol = new URLSearchParams(location.search).get('symbol');
if (urlSymbol) document.getElementById('symbol').value = urlSymbol.toUpperCase();

buildLegend();
loadData();
document.getElementById('load-btn').addEventListener('click', loadData);
document.getElementById('symbol').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadData();
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  loadData();
});

// Dos ritmos: refresco completo (60s, pesado: 4 timeframes) y precio en
// vivo (5s, 1 sola llamada) que "respira" la ultima vela sin recargar todo.
const FULL_REFRESH_MS = 60000;
const PRICE_POLL_MS = 5000;

let autoInterval = null;
let priceInterval = null;

async function pollPrice() {
  if (!lastCandle || !candleSeries) return;
  const symbol = document.getElementById('symbol').value.trim().toUpperCase() || 'SPY';
  try {
    const resp = await fetch(`{% url 'powertradeai:chart_price' %}?symbol=${symbol}`);
    if (!resp.ok) return;
    const d = await resp.json();
    if (d.price == null) return;
    // Actualiza el cierre (y extremos) de la ultima vela con el precio nuevo.
    lastCandle = {
      ...lastCandle,
      close: d.price,
      high: Math.max(lastCandle.high, d.price),
      low: Math.min(lastCandle.low, d.price),
    };
    candleSeries.update(lastCandle);
    recomputeLive();   // MAs y Bollinger del ultimo punto, en local (sin red)
    document.getElementById('last-update').textContent =
      'Precio ' + d.price.toFixed(2) + ' · ' + new Date().toLocaleTimeString();
  } catch (e) { /* silencioso: un fallo de red no debe romper el poll */ }
}

// Recalcula SOLO el ultimo punto de las medias y las bandas con el precio en
// vivo, usando los cierres ya cargados. No pide nada a la red.
function recomputeLive() {
  if (!lastCandle || liveCloses.length < 2) return;
  const t = lastCandle.time;
  const n = liveCloses.length;
  liveCloses[n - 1] = lastCandle.close;   // el ultimo cierre es el precio vivo

  const meanLast = (P) => {
    let sum = 0;
    for (let i = n - P; i < n; i++) sum += liveCloses[i];
    return sum / P;
  };

  for (const p of Object.keys(MA_COLORS)) {
    const P = +p;
    if (n >= P) maSeriesMap[p].update({ time: t, value: +meanLast(P).toFixed(2) });
  }

  const P = 20;   // Bollinger (20, 2)
  if (n >= P) {
    const mid = meanLast(P);
    let vs = 0;
    for (let i = n - P; i < n; i++) { const dv = liveCloses[i] - mid; vs += dv * dv; }
    const std = Math.sqrt(vs / P);
    const up = +(mid + 2 * std).toFixed(2);
    const lo = +(mid - 2 * std).toFixed(2);
    bbSeries.upper.update({ time: t, value: up });
    bbSeries.middle.update({ time: t, value: +mid.toFixed(2) });
    bbSeries.lower.update({ time: t, value: lo });
    if (bbFill && bbFillPts.length) {
      bbFillPts[bbFillPts.length - 1] = { time: t, upper: up, lower: lo };
      bbFill.setData(bbFillPts);
    }
  }
}

function startAuto() {
  stopAuto();
  autoInterval = setInterval(() => loadData(), FULL_REFRESH_MS);
  priceInterval = setInterval(() => pollPrice(), PRICE_POLL_MS);
  document.getElementById('auto-status').textContent = 'LIVE';
  document.getElementById('auto-status').style.color = 'var(--green)';
  document.getElementById('auto-btn').textContent = 'Pausar';
}
function stopAuto() {
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  if (priceInterval) { clearInterval(priceInterval); priceInterval = null; }
  document.getElementById('auto-status').textContent = 'PAUSA';
  document.getElementById('auto-status').style.color = 'var(--text-3)';
  document.getElementById('auto-btn').textContent = 'Live';
}
document.getElementById('auto-btn').addEventListener('click', () => {
  autoInterval ? stopAuto() : startAuto();
});
startAuto();

// ── Chat con el agente ──────────────────────────────────────────────
let chatHistory = [];

function currentSym() {
  return document.getElementById('symbol').value.trim().toUpperCase() || 'SPY';
}
function toggleChat() {
  const d = document.getElementById('chat-drawer');
  d.classList.toggle('open');
  if (d.classList.contains('open')) {
    const sym = currentSym();
    document.getElementById('chat-symbol').textContent = sym;
    document.getElementById('chat-hint-sym').textContent = sym;
    document.getElementById('chat-text').focus();
  }
}
function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}
function addBubble(cls, text) {
  const el = document.createElement('div');
  el.className = 'bubble ' + cls;
  el.textContent = text;
  document.getElementById('chat-msgs').appendChild(el);
  const box = document.getElementById('chat-msgs');
  box.scrollTop = box.scrollHeight;
  return el;
}
function getCookie(name) {
  const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return m ? m.pop() : '';
}
async function sendChat() {
  const input = document.getElementById('chat-text');
  const btn = document.getElementById('chat-send');
  const msg = input.value.trim();
  if (!msg) return;
  const sym = currentSym();
  document.getElementById('chat-symbol').textContent = sym;

  addBubble('user', msg);
  chatHistory.push({role: 'user', content: msg});
  input.value = '';
  btn.disabled = true;
  const thinking = addBubble('bot thinking', 'pensando…');

  try {
    const resp = await fetch("{% url 'powertradeai:chart_chat' %}", {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
      body: JSON.stringify({symbol: sym, message: msg, history: chatHistory.slice(0, -1)}),
    });
    const d = await resp.json();
    thinking.remove();
    if (!resp.ok) { addBubble('bot', 'Error: ' + (d.error || resp.status)); return; }
    const bot = addBubble('bot', d.reply || '(sin respuesta)');
    if (d.alerts_created) {
      const m = document.createElement('span');
      m.className = 'meta'; m.textContent = `⚑ ${d.alerts_created} alerta(s) creada(s)`;
      bot.appendChild(m);
    }
    chatHistory.push({role: 'assistant', content: d.reply || ''});
  } catch (err) {
    thinking.remove();
    addBubble('bot', 'Error: ' + err.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
